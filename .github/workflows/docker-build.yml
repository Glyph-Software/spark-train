name: Build and push Docker image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - workspace/**
      - .github/workflows/docker-build.yml
  workflow_dispatch:

env:
  IMAGE: ghcr.io/glyph-software/spark-train

jobs:
  build-and-push:
    # Native arm64 runner: the image targets the GB10 (ARM64), and the NGC base
    # is far too large to emulate under QEMU on an amd64 runner.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The NGC PyTorch base image is >20 GB uncompressed; reclaim the runner
      # disk space taken by preinstalled toolchains before pulling it.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          sudo docker system prune -af
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
